# Manual deploy for the Strapi backend.
#
# Trigger:
#   GitHub → Actions → Deploy backend → Run workflow → pick a branch/tag.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VM_HOST           - public hostname or IP of the production VM
#   VM_USER           - SSH user on the VM with docker access (e.g. `codrin`)
#   VM_SSH_KEY        - Private SSH key matching an authorized_keys entry on the VM
#   VM_BACKEND_PATH   - absolute path to the cloned repo on the VM (e.g. /opt/edusport/edusport_backend)
#
# The workflow is a thin shim: it SSHes in, syncs the chosen ref, and runs the
# same `scripts/deploy.sh` an operator would run manually.

name: Deploy backend

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to deploy (defaults to main)"
        required: false
        default: main

concurrency:
  group: deploy-backend-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VM and run deploy script
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VM_BACKEND_PATH }}"
            git fetch --prune
            git reset --hard "origin/${{ inputs.ref }}"
            ./scripts/deploy.sh
