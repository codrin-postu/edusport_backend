# Production stack for the EduSport CMS.
# Postgres + Strapi backend on the shared external `edusport_net` network.
# The reverse proxy (separate compose or host nginx) is what exposes ports 80/443.

services:
  postgres:
    image: postgres:16-alpine
    container_name: edusport_postgres
    env_file: .env.production
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - edusport_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: edusport_backend
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "1337"
    volumes:
      - uploads:/opt/app/public/uploads
    networks:
      - edusport_net
    restart: unless-stopped

networks:
  edusport_net:
    external: true

volumes:
  pgdata:
  uploads:
