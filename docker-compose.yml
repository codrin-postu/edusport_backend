# Development only. Production uses docker-compose.production.yml.
# Secrets here have sensible local-dev defaults but can be overridden via .env.

services:
  strapi:
    build: .
    container_name: strapi_app
    ports:
      - "1337:1337"
      - "5173:5173"
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-edusport_postgres}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-strapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-strapi}
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${APP_KEYS:-localDevKey1,localDevKey2}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-localDevApiTokenSalt}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-localDevAdminJwtSecret}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-localDevTransferTokenSalt}
      JWT_SECRET: ${JWT_SECRET:-localDevJwtSecret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-localDevEncryptionKey}
      # Frontend route that renders unpublished article drafts using the same
      # _View component as production. Used by the admin's Previzualizează
      # button to open a side-panel preview.
      STRAPI_PREVIEW_FRONTEND_URL: ${STRAPI_PREVIEW_FRONTEND_URL:-http://localhost:3000}
      STRAPI_PREVIEW_SECRET: ${STRAPI_PREVIEW_SECRET:-localDevPreviewSecret}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: strapi_db
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-strapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-strapi}
      POSTGRES_DB: ${DATABASE_NAME:-edusport_postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
