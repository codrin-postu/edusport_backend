version: '3.9'
services:
  strapi:
    build: .
    container_name: strapi_app
    ports:
      - "1337:1337"
      - "5173:5173"
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: edusport_postgres
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: "localDevKey1,localDevKey2"
      API_TOKEN_SALT: localDevApiTokenSalt
      ADMIN_JWT_SECRET: localDevAdminJwtSecret
      TRANSFER_TOKEN_SALT: localDevTransferTokenSalt
      JWT_SECRET: localDevJwtSecret
      ENCRYPTION_KEY: localDevEncryptionKey
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: strapi_db
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
      POSTGRES_DB: edusport_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data: